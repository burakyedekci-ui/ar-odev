<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
    .example-container { overflow: hidden; position: absolute; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="example-container">
    <a-scene
      mindar-image="imageTargetSrc: targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-entity mindar-image-target="targetIndex: 0">

        <!-- Ana başlık -->
        <a-text
          value="DIJITAL SANAT"
          color="#FF3333"
          align="center"
          position="0 0.35 0"
          scale="0.8 0.8 0.8"
          font="mozillavr"
          animation="property: scale; from: 0.01 0.01 0.01; to: 0.8 0.8 0.8; dur: 1000; easing: easeOutElastic"
          animation__fade="property: opacity; from: 0; to: 1; dur: 800"
        ></a-text>

        <!-- Alt başlık -->
        <a-text
          value="ARTTIRILMIS GERCEKLIK"
          color="#FFFFFF"
          align="center"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          font="mozillavr"
          animation="property: scale; from: 0.01 0.01 0.01; to: 0.5 0.5 0.5; dur: 1000; delay: 500; easing: easeOutElastic"
          animation__fade="property: opacity; from: 0; to: 1; dur: 800; delay: 500"
        ></a-text>

        <!-- Alt metin -->
        <a-text
          value="2026"
          color="#33CCFF"
          align="center"
          position="0 -0.3 0"
          scale="0.6 0.6 0.6"
          font="mozillavr"
          animation="property: scale; from: 0.01 0.01 0.01; to: 0.6 0.6 0.6; dur: 1000; delay: 1000; easing: easeOutElastic"
          animation__fade="property: opacity; from: 0; to: 1; dur: 800; delay: 1000"
          animation__pulse="property: scale; from: 0.6 0.6 0.6; to: 0.7 0.7 0.7; dur: 1500; delay: 2000; dir: alternate; loop: true; easing: easeInOutSine"
        ></a-text>

        <!-- Arka plan kutu -->
        <a-plane
          color="#000000"
          opacity="0.6"
          width="1.6"
          height="1.2"
          position="0 0.05 -0.01"
          animation="property: opacity; from: 0; to: 0.6; dur: 600"
        ></a-plane>

      </a-entity>
    </a-scene>
  </div>
</body>
</html>
